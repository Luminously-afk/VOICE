<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>V.O.I.C.E - Login</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration for Custom Theme Colors -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'voice-dark': '#1a1d21',
            'voice-card': '#24292e',
            'voice-green': '#50d475',
            'voice-green-hover': '#45c168',
            'voice-border': '#30363d',
          },
          boxShadow: {
            'glow-green': '0 0 8px 1px rgba(80, 212, 117, 0.4)',
          }
        }
      }
    }
  </script>
<!-- BEGIN: Custom Styles -->
<style data-purpose="background-pattern">
    /* Subtle hexagonal pattern background to match the reference image */
    body {
      background-color: #1a1d21;
      background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
    }
  </style>
<style data-purpose="input-focus-effects">
    /* Custom glow effect for form inputs on focus */
    .voice-input:focus {
      outline: none;
      border-color: #50d475;
      box-shadow: 0 0 10px rgba(80, 212, 117, 0.5);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<!-- BEGIN: LoginCard -->
<main class="w-full max-w-md bg-voice-card border border-voice-green/30 rounded-2xl p-10 shadow-2xl" data-purpose="login-container">
<!-- BEGIN: HeaderSection -->
<header class="text-center mb-10">
<div class="flex items-center justify-center gap-2 mb-2" data-purpose="logo-container">
<h1 class="text-4xl font-bold tracking-widest text-voice-green">V.O.I.C.E</h1>
<!-- Simple SVG waveform icon representing the 'voice' theme -->
<svg class="w-8 h-8 text-voice-green" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 2C11.4477 2 11 2.44772 11 3V21C11 21.5523 11.4477 22 12 22C12.5523 22 13 21.5523 13 21V3C13 2.44772 12.5523 2 12 2Z"></path>
<path d="M7 7C6.44772 7 6 7.44772 6 8V16C6 16.5523 6.44772 17 7 17C7.55228 17 8 16.5523 8 16V8C8 7.44772 7.55228 7 7 7Z"></path>
<path d="M17 7C16.4477 7 16 7.44772 16 8V16C16 16.5523 16.4477 17 17 17C17.5523 17 18 16.5523 18 16V8C18 7.44772 17.5523 7 17 7Z"></path>
<path d="M2 11C1.44772 11 1 11.4477 1 12C1 12.5523 1.44772 13 2 13H3C3.55228 13 4 12.5523 4 12C4 11.4477 3.55228 11 3 11H2Z"></path>
<path d="M21 11C20.4477 11 20 11.4477 20 12C20 12.5523 20.4477 13 21 13H22C22.5523 13 23 12.5523 23 12C23 11.4477 22.5523 11 22 11H21Z"></path>
</svg>
</div>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: LoginForm -->
<form action="#" class="space-y-6" method="POST">
<!-- Username Field -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="voice-input block w-full pl-11 pr-4 py-3 bg-voice-dark border border-voice-border rounded-lg text-gray-200 placeholder-gray-500 transition-all duration-200" id="username" name="username" placeholder="Username or Email" required="" type="text"/>
</div>
<!-- Password Field -->
<div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="voice-input block w-full pl-11 pr-4 py-3 bg-voice-dark border border-voice-border rounded-lg text-gray-200 placeholder-gray-500 transition-all duration-200" id="password" name="password" placeholder="Password" required="" type="password"/>
</div>
<div class="flex justify-end mt-2">
<a class="text-sm text-voice-green/80 hover:text-voice-green transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<!-- Login Button -->
<button class="w-full py-3 px-4 bg-voice-green hover:bg-voice-green-hover text-voice-dark font-bold rounded-full transition-all duration-200 shadow-lg transform active:scale-95" type="submit">
        Login
      </button>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-voice-border"></div>
<span class="flex-shrink mx-4 text-gray-500 text-sm">Or continue with</span>
<div class="flex-grow border-t border-voice-border"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2 px-4 border border-voice-border rounded-full hover:bg-voice-dark transition-colors text-gray-300" type="button">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB70g7KomgAem4raP8WcouicK9BM6yiyiy4prw3TAiQWE8Q3qi6hsVni0OcCJfMVA4S0mEJsEzd_Eh9BzbN3SQmA7441ljpcyecoViPj8RrDCXUaMjUzUwpIOCU25NvitOnp7kCjXVxkuw4I69ofZIU0qBA4m1qTI4a66Y-gjVZDpjvtw7bqnwel5bzMaiHhN-wZAYJyIsM8i7KOJox9tFMVb5W-czHsUACNaodglixSk0vFuJ8gfXWVptAjIpKFONrlQFUKh4OpVWu"/>
<span class="text-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-2 px-4 border border-voice-border rounded-full hover:bg-voice-dark transition-colors text-gray-300" type="button">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path>
</svg>
<span class="text-sm">Github</span>
</button>
</div>
<!-- Sign Up Footer -->
<div class="text-center pt-4">
<p class="text-gray-400 text-sm">
          New to V.O.I.C.E? 
          <a class="text-voice-green font-semibold hover:underline decoration-2 underline-offset-4" href="#">Sign Up</a>
</p>
</div>
</form>
<!-- END: LoginForm -->
</main>
<!-- END: LoginCard -->
</body></html>
