<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>V.O.I.C.E - Share Insight</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-colors">
    :root {
      --v-dark-charcoal: #1a1d21;
      --v-modal-bg: #2d333b;
      --v-accent-green: #2ecc71;
      --v-accent-green-glow: rgba(46, 204, 113, 0.3);
      --v-input-bg: #22272e;
      --v-border: #444c56;
      --v-text-muted: #adbac7;
    }
    
    body {
      background-color: var(--v-dark-charcoal);
      color: #adbac7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    }

    /* Custom Focus States */
    .v-input-focus:focus {
      outline: none;
      border-color: var(--v-accent-green) !important;
      box-shadow: 0 0 0 2px var(--v-accent-green-glow) !important;
    }

    /* Custom scrollbar for dark theme */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--v-dark-charcoal);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--v-border);
      border-radius: 4px;
    }
  </style>
<style data-purpose="toggle-switch">
    /* Styled Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444c56;
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--v-accent-green);
      box-shadow: 0 0 10px var(--v-accent-green-glow);
    }
    input:checked + .slider:before {
      transform: translateX(24px);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">
<!-- BEGIN: BackgroundOverlay -->
<!-- Represents the blurred content behind the modal -->
<div class="fixed inset-0 z-0 opacity-40 pointer-events-none overflow-hidden">
<div class="p-8">
<div class="text-3xl font-bold mb-8 text-white">V.O.I.C.E</div>
<div class="grid grid-cols-1 gap-6 max-w-4xl">
<div class="h-32 bg-gray-800 rounded-lg"></div>
<div class="h-32 bg-gray-800 rounded-lg"></div>
<div class="h-32 bg-gray-800 rounded-lg"></div>
</div>
</div>
</div>
<!-- END: BackgroundOverlay -->
<!-- BEGIN: ShareInsightModal -->
<main class="relative z-10 w-full max-w-2xl bg-[#2d333b] rounded-xl shadow-2xl border border-[#444c56] overflow-hidden" data-purpose="share-insight-modal">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4 border-b border-[#444c56]">
<h1 class="text-xl font-semibold text-white">Share Insight Post</h1>
<button aria-label="Close modal" class="text-gray-400 hover:text-white transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</header>
<!-- Form Content -->
<form class="p-6 space-y-6">
<!-- Select Event Dropdown -->
<section data-purpose="event-selection">
<label class="block text-sm font-medium text-gray-300 mb-2" for="event-select">Select Event</label>
<div class="relative">
<select class="w-full bg-[#22272e] border border-[#444c56] text-white rounded-md py-2.5 px-4 appearance-none focus:ring-1 focus:ring-[#2ecc71] focus:border-[#2ecc71] v-input-focus transition-all" id="event-select">
<option value="">Select Event</option>
<option value="cleanup">Community Cleanup - Oct 26</option>
<option value="market">Local Market Fair - Nov 2</option>
<option value="talk">Tech Talk: Future of Cities</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
</section>
<!-- Title Input -->
<section data-purpose="title-input">
<label class="block text-sm font-medium text-gray-300 mb-2" for="post-title">Title</label>
<input class="w-full bg-[#22272e] border border-[#444c56] text-white rounded-md py-3 px-4 placeholder:text-gray-500 focus:ring-1 focus:ring-[#2ecc71] focus:border-[#2ecc71] v-input-focus transition-all" id="post-title" placeholder="Enter a title for your insight (e.g., 'My takeaway from the town hall')" type="text"/>
</section>
<!-- Rich Text Area -->
<section class="border border-[#444c56] rounded-md overflow-hidden bg-[#22272e] focus-within:ring-1 focus-within:ring-[#2ecc71] focus-within:border-[#2ecc71] transition-all" data-purpose="rich-text-editor">
<!-- Editor Toolbar -->
<div class="flex items-center space-x-4 px-4 py-2 bg-[#2d333b] border-b border-[#444c56]">
<button class="text-gray-400 hover:text-white" title="Bold" type="button"><strong>B</strong></button>
<button class="text-gray-400 hover:text-white" title="Italic" type="button"><em>I</em></button>
<button class="text-gray-400 hover:text-white" title="Underline" type="button"><u>U</u></button>
<div class="w-px h-4 bg-[#444c56]"></div>
<button class="text-gray-400 hover:text-white" title="List" type="button">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path clip-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" fill-rule="evenodd"></path></svg>
</button>
<button class="text-gray-400 hover:text-white" title="Link" type="button">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.826a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button class="text-gray-400 hover:text-white" title="Image" type="button">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
<!-- Editor Content Area -->
<textarea class="w-full bg-transparent border-none text-white p-4 h-40 resize-none focus:ring-0 placeholder:text-gray-500" placeholder="Share your thoughts, experiences, or observations here... (max 500 words)"></textarea>
</section>
<!-- Footer Actions -->
<footer class="flex flex-col sm:flex-row items-center justify-between pt-4 space-y-4 sm:space-y-0">
<!-- Anonymous Toggle -->
<div class="flex items-center space-x-3" data-purpose="anonymous-toggle-container">
<label class="switch">
<input id="anonymous-toggle" type="checkbox"/>
<span class="slider"></span>
</label>
<label class="text-sm font-medium text-gray-300 cursor-pointer" for="anonymous-toggle">Post Anonymously</label>
</div>
<!-- Buttons -->
<div class="flex items-center space-x-3">
<button class="px-6 py-2.5 rounded-md font-medium text-gray-300 bg-[#444c56] hover:bg-[#545d68] transition-colors" type="button">
            Cancel
          </button>
<button class="px-6 py-2.5 rounded-md font-bold text-[#1a1d21] bg-[#2ecc71] hover:bg-[#27ae60] shadow-[0_0_15px_rgba(46,204,113,0.4)] transition-all" type="submit">
            Share Insight
          </button>
</div>
</footer>
</form>
</main>
<!-- END: ShareInsightModal -->
</body></html>
